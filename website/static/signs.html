<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SentiSign — Signs Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e14; --surface:#111720; --border:#1e2d3d;
  --teal:#00d4aa; --text:#e8f0fe; --muted:#5a7a8a; --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);background:rgba(10,14,20,0.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--teal);}
.nav-logo span{color:var(--text);}
.nav-links{display:flex;gap:32px;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.9rem;font-weight:500;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--teal);}

.page-header{padding:48px 40px 24px;max-width:1200px;margin:0 auto;}
.page-header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;margin-bottom:8px;}
.page-header h1 em{color:var(--teal);font-style:normal;}
.page-header p{color:var(--muted);max-width:480px;line-height:1.6;}

.search-bar{max-width:1200px;margin:0 auto;padding:0 40px 24px;}
.search-input{
  width:100%;max-width:400px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;
  outline:none;transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--teal);}
.search-input::placeholder{color:var(--muted);}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
  max-width:1200px;margin:0 auto;padding:0 40px 60px;
}
.sign-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  cursor:pointer;transition:all 0.25s;
  position:relative;
}
.sign-card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,212,170,0.1);}
.card-gif{
  width:100%;aspect-ratio:1;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card-gif img{width:100%;height:100%;object-fit:cover;}
.gif-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;color:var(--border);
}
.card-info{padding:12px;}
.card-word{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:1rem;color:var(--text);margin-bottom:2px;
}
.card-class{font-size:0.75rem;color:var(--muted);}
.card-badge{
  position:absolute;top:8px;right:8px;
  background:rgba(0,212,170,0.15);
  border:1px solid rgba(0,212,170,0.3);
  color:var(--teal);
  border-radius:6px;padding:2px 7px;font-size:0.7rem;font-weight:600;
}

.loading{text-align:center;padding:80px;color:var(--muted);}
.count-label{color:var(--muted);font-size:0.85rem;padding:0 40px 16px;max-width:1200px;margin:0 auto;}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));padding:0 16px 40px;}
  nav,.page-header,.search-bar,.count-label{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Senti<span>Sign</span></div>
  <div class="nav-links">
    <a href="/">Communicate</a>
    <a href="/signs" class="active">Signs</a>
    <a href="/contribute">Contribute</a>
    <a href="/about">About</a>
  </div>
</nav>

<div class="page-header">
  <h1>Signs <em>Gallery</em></h1>
  <p>All signs currently in the system. Hover a card to see the reference gesture. Use these to learn the vocabulary before signing.</p>
</div>

<div class="search-bar">
  <input class="search-input" type="text" id="searchInput"
    placeholder="Search by word (e.g. HELP, WATER)..."
    oninput="filterSigns()">
</div>

<div class="count-label" id="countLabel"></div>
<div class="grid" id="signsGrid">
  <div class="loading">Loading signs...</div>
</div>

<script>
let allSigns = [];

async function loadSigns() {
  try {
    const res  = await fetch('/api/signs');
    const data = await res.json();
    allSigns = data.signs;
    renderSigns(allSigns);
  } catch(e) {
    document.getElementById('signsGrid').innerHTML =
      '<div class="loading">Failed to load signs. Is the server running?</div>';
  }
}

function renderSigns(signs) {
  const grid = document.getElementById('signsGrid');
  const lbl  = document.getElementById('countLabel');
  lbl.textContent = `${signs.length} sign${signs.length !== 1 ? 's' : ''} available`;

  if (signs.length === 0) {
    grid.innerHTML = '<div class="loading">No signs found.</div>';
    return;
  }

  grid.innerHTML = signs.map(s => {
    const isCustom = s.class.startsWith('CUSTOM_');
    const gif      = s.gif_url
      ? `<img src="${s.gif_url}" alt="${s.word}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=gif-placeholder>✋</div>'">`
      : `<div class="gif-placeholder">✋</div>`;

    return `
      <div class="sign-card">
        ${isCustom ? '<div class="card-badge">NEW</div>' : ''}
        <div class="card-gif">${gif}</div>
        <div class="card-info">
          <div class="card-word">${s.word}</div>
          <div class="card-class">Sign: ${s.class}</div>
        </div>
      </div>
    `;
  }).join('');
}

function filterSigns() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  if (!q) { renderSigns(allSigns); return; }
  renderSigns(allSigns.filter(s =>
    s.word.includes(q) || s.class.includes(q)
  ));
}

loadSigns();
</script>
</body>
</html>
